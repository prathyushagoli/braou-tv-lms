<div class="user-schedules-container">
  <div class="page-header">
    <h1 class="page-title">Schedules</h1>
  </div>

  <div class="grid-container" *ngIf="paginatedSchedules.length > 0">
    <div class="ui-card schedule-ui-card" *ngFor="let schedule of paginatedSchedules" (click)="previewFile(schedule.fileName)">

      <div class="card-thumbnail pdf-thumbnail">
        <iframe [src]="getSafeUrl(schedule.fileName)" title="PDF Preview" scrolling="no"
          class="pdf-thumbnail-frame"></iframe>
        <div class="thumbnail-overlay"></div>
      </div>

      <div class="card-content">
        <span class="schedule-date-chip">
          <svg class="calendar-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
          {{ formatDate(schedule.createdAt) }}
        </span>

        <h3 class="schedule-title">{{ schedule.title }}</h3>
        <p class="schedule-file-name" title="{{ schedule.fileName }}">
          {{ schedule.fileName }}
        </p>
      </div>

      <div class="card-actions">
        <button class="download-btn" (click)="downloadFile($event, schedule.fileName)" title="Download Document">
          Download PDF
        </button>
      </div>

    </div>
  </div>

  <div class="pagination-container" *ngIf="totalPages > 1">
    <button class="pagination-btn" [disabled]="currentPage === 1" (click)="changePage(currentPage - 1)">Previous</button>
    <span class="pagination-info">Page {{ currentPage }} of {{ totalPages }}</span>
    <button class="pagination-btn" [disabled]="currentPage === totalPages" (click)="changePage(currentPage + 1)">Next</button>
  </div>

  <div class="empty-state" *ngIf="paginatedSchedules.length === 0">
    <div class="empty-content">
      <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16h16V8l-6-6z" />
        <path d="M14 2v6h6" />
        <line x1="16" y1="13" x2="8" y2="13" />
        <line x1="16" y1="17" x2="8" y2="17" />
        <polyline points="10 9 9 9 8 9" />
      </svg>
      <h2>No Schedules Found</h2>
      <p>There are currently no official schedules available for download.</p>
    </div>
  </div>
</div>
