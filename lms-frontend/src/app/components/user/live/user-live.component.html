<div class="user-live-container">

  <div class="sticky-group">
    <div class="page-header">
      <h1 class="page-title">Live TV</h1>
    </div>

    <div class="live-navigation">
      <div class="tabs-container">
        <button *ngFor="let type of liveTypes" class="tab-btn" [ngClass]="{'active': activeType === type}"
          (click)="setActiveTab(type)">
          {{ type }}
        </button>
      </div>
    </div>
  </div>

  <div class="loading-state" *ngIf="isLoading">
    <div class="spinner"></div>
    <p>Loading streams...</p>
  </div>

  <ng-container *ngIf="!isLoading">
    <!-- Active Live Feed Section -->
    <div class="live-feed-section" *ngIf="activeStream">

    <div class="live-header-box">
      <div class="pulse-container">
        <div class="pulsing-recording-icon">
          <span class="pulse-circle"></span>
          <span class="live-text">Now Broadcasting</span>
        </div>
      </div>
      <h2 class="live-label">LIVE SESSION</h2>
    </div>

    <div class="hero-player">
      <iframe *ngIf="getSafeUrl(activeStream.url, true); let safeUrl" [src]="safeUrl" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>

    <div class="live-meta-info">
      <h1>{{ activeStream.name }}</h1>
    </div>

  </div>

  <div class="no-live-fallback" *ngIf="!activeStream">
    <div class="fallback-content">
      <svg aria-hidden="true" width="48" height="48" fill="none" viewBox="0 0 24 24">
        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M12 14v3m-3-6V7a3 3 0 1 1 6 0v4m-8 0h10a1 1 0 0 1 1 1v7a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1v-7a1 1 0 0 1 1-1Z" />
      </svg>
      <h2>No Active Broadcast</h2>
      <p>There are no live sessions broadcasting at the moment. Please check back later or browse past streams.</p>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Past Sessions Section -->
  <div class="past-sessions-section">
    <div class="page-header">
      <h2 class="page-title">Past Sessions</h2>
    </div>

    <!-- Content Grid -->
    <div class="streams-content-area">
      <div class="grid-container" *ngIf="pastSessions.length > 0">
        <div class="video-card" *ngFor="let stream of pastSessions">
          
          <!-- Facade Wrapper -->
          <div class="facade-container" *ngIf="activeVideoId !== stream.id" (click)="playVideo(stream.id)">
            <img loading="lazy" [src]="'https://img.youtube.com/vi/' + extractVideoId(stream.url) + '/hqdefault.jpg'" alt="Video Thumbnail" class="facade-img">
            <div class="facade-play-btn">
              <svg viewBox="0 0 68 48" class="youtube-play-icon">
                <path class="ytp-large-play-button-bg" d="M66.52,7.74c-0.78-2.93-2.49-5.41-5.42-6.19C55.79,.13,34,0,34,0S12.21,.13,6.9,1.55 C3.97,2.33,2.27,4.81,1.48,7.74C0.06,13.05,0,24,0,24s0.06,10.95,1.48,16.26c0.78,2.93,2.49,5.41,5.42,6.19 C12.21,47.87,34,48,34,48s21.79-0.13,27.1-1.55c2.93-0.78,4.64-3.26,5.42-6.19C67.94,34.95,68,24,68,24S67.94,13.05,66.52,7.74z" fill="#FF0000"></path>
                <path d="M 45,24 27,14 27,34" fill="#fff"></path>
              </svg>
            </div>
          </div>

          <div class="iframe-container" *ngIf="activeVideoId === stream.id">
            <iframe *ngIf="getSafeUrl(stream.url); let safeUrl" [src]="safeUrl" frameborder="0"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen>
            </iframe>

            <div class="invalid-url" *ngIf="!getSafeUrl(stream.url)">
              <span>Media Unavailable</span>
            </div>
          </div>

          <div class="card-footer">
            <h3>{{ stream.name }}</h3>
          </div>
        </div>
      </div>

      <!-- Empty State -->
      <div class="empty-state" *ngIf="pastSessions.length === 0">
        <p>No past sessions available yet.</p>
      </div>

    </div>
  </div>
  </ng-container>
</div>
