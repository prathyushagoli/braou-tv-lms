<div class="user-programmes-container">
  <div class="sticky-group">
    <div class="page-header">
      <h1 class="page-title">Programmes</h1>
    </div>

  <div class="programmes-navigation">
    <div class="tabs-container">
      <button *ngFor="let type of programmeTypes" class="tab-btn" [ngClass]="{'active': activeType === type}"
        (click)="setActiveTab(type)">
        {{ type }}
      </button>
    </div>
    </div>
  </div>

  <!-- Content Grid -->
  <div class="programmes-content-area">

    <div class="grid-container" *ngIf="filteredProgrammes.length > 0">
      <div class="video-card" *ngFor="let prog of filteredProgrammes">
        
        <!-- Facade Wrapper -->
        <div class="facade-container" *ngIf="activeVideoId !== prog.id" (click)="playVideo(prog.id)">
          <img loading="lazy" [src]="'https://img.youtube.com/vi/' + extractVideoId(prog.url) + '/hqdefault.jpg'" alt="Video Thumbnail" class="facade-img">
          <div class="facade-play-btn">
            <svg viewBox="0 0 68 48" class="youtube-play-icon">
              <path class="ytp-large-play-button-bg" d="M66.52,7.74c-0.78-2.93-2.49-5.41-5.42-6.19C55.79,.13,34,0,34,0S12.21,.13,6.9,1.55 C3.97,2.33,2.27,4.81,1.48,7.74C0.06,13.05,0,24,0,24s0.06,10.95,1.48,16.26c0.78,2.93,2.49,5.41,5.42,6.19 C12.21,47.87,34,48,34,48s21.79-0.13,27.1-1.55c2.93-0.78,4.64-3.26,5.42-6.19C67.94,34.95,68,24,68,24S67.94,13.05,66.52,7.74z" fill="#FF0000"></path>
              <path d="M 45,24 27,14 27,34" fill="#fff"></path>
            </svg>
          </div>
        </div>

        <!-- iframe conditionally renders -->
        <div class="iframe-container" *ngIf="activeVideoId === prog.id">
          <iframe *ngIf="getSafeUrl(prog.url); let safeUrl" [src]="safeUrl" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
          </iframe>
          <div class="invalid-url" *ngIf="!getSafeUrl(prog.url)">
            <span>Media Unavailable</span>
          </div>
        </div>

        <div class="card-footer">
          <h3>{{ prog.title }}</h3>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div class="empty-state" *ngIf="filteredProgrammes.length === 0">
      <p>No programmes available in this section.</p>
    </div>

  </div>
</div>
