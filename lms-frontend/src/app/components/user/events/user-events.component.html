<div class="user-events-container">
  <div class="sticky-group">
    <div class="page-header">
      <h1 class="page-title">University Events</h1>
    </div>

  <div class="events-navigation">
    <div class="tabs-container">
      <button *ngFor="let type of eventTypes" class="tab-btn" [ngClass]="{'active': activeType === type}"
        (click)="setActiveTab(type)">
        {{ type }}
      </button>
    </div>
    </div>
  </div>

  <!-- Content Grid -->
  <div class="events-content-area">

    <div class="grid-container" *ngIf="filteredEvents.length > 0">
      <div class="video-card" *ngFor="let event of filteredEvents">
        
        <!-- Facade Wrapper -->
        <div class="facade-container" *ngIf="activeVideoId !== event.id" (click)="playVideo(event.id)">
          <img loading="lazy" [src]="'https://img.youtube.com/vi/' + extractVideoId(event.url) + '/hqdefault.jpg'" alt="Video Thumbnail" class="facade-img">
          <div class="facade-play-btn">
            <svg viewBox="0 0 68 48" class="youtube-play-icon">
              <path class="ytp-large-play-button-bg" d="M66.52,7.74c-0.78-2.93-2.49-5.41-5.42-6.19C55.79,.13,34,0,34,0S12.21,.13,6.9,1.55 C3.97,2.33,2.27,4.81,1.48,7.74C0.06,13.05,0,24,0,24s0.06,10.95,1.48,16.26c0.78,2.93,2.49,5.41,5.42,6.19 C12.21,47.87,34,48,34,48s21.79-0.13,27.1-1.55c2.93-0.78,4.64-3.26,5.42-6.19C67.94,34.95,68,24,68,24S67.94,13.05,66.52,7.74z" fill="#FF0000"></path>
              <path d="M 45,24 27,14 27,34" fill="#fff"></path>
            </svg>
          </div>
        </div>

        <!-- iframe conditionally renders -->
        <div class="iframe-container" *ngIf="activeVideoId === event.id">
          <iframe *ngIf="getSafeUrl(event.url); let safeUrl" [src]="safeUrl" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
          </iframe>
          <div class="invalid-url" *ngIf="!getSafeUrl(event.url)">
            <span>Media Unavailable</span>
          </div>
        </div>

        <div class="card-footer">
          <h3>{{ event.title }}</h3>
          <p class="event-meta" *ngIf="event.eventDate">
            <svg aria-hidden="true" width="14" height="14" fill="none" viewBox="0 0 24 24">
              <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 10h16M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01M16 18h.01M5 20h14a1 1 0 0 0 1-1V7a1 1 0 0 0-1-1H5a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1Zm3-16v2m8-2v2" />
            </svg>
            {{ event.eventDate | date:'mediumDate' }}
          </p>
        </div>
      </div>
    </div>

    <!-- Empty State Matching Mockup perfectly -->
    <div class="empty-state" *ngIf="filteredEvents.length === 0">
      <p>No events available in this section yet.</p>
    </div>

  </div>
</div>
