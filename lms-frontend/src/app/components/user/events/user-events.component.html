<div class="user-events-container">
  <div class="sticky-group">
    <div class="page-header">
      <h1 class="page-title">University Events</h1>
    </div>

  <div class="events-navigation">
    <div class="tabs-container">
      <button *ngFor="let type of eventTypes" class="tab-btn" [ngClass]="{'active': activeType === type}"
        (click)="setActiveTab(type)">
        {{ type }}
      </button>
    </div>
    </div>
  </div>

  <!-- Content Grid -->
  <div class="events-content-area">

    <div class="grid-container" *ngIf="paginatedEvents.length > 0">
      <div class="video-card" *ngFor="let event of paginatedEvents">
        
        <!-- Facade Wrapper -->
        <div class="facade-container" *ngIf="activeVideoId !== event.id" (click)="playVideo(event.id)">
          <img [src]="'https://img.youtube.com/vi/' + extractVideoId(event.url) + '/hqdefault.jpg'" alt="Video Thumbnail" class="facade-img">
          <div class="facade-play-btn">
            <svg width="24" height="24" fill="white" viewBox="0 0 24 24">
              <path d="M8 5v14l11-7z" />
            </svg>
          </div>
        </div>

        <!-- iframe conditionally renders -->
        <div class="iframe-container" *ngIf="activeVideoId === event.id">
          <iframe [src]="getSafeUrl(event.url)" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
          </iframe>
          <div class="invalid-url" *ngIf="!getSafeUrl(event.url)">
            <span>Media Unavailable</span>
          </div>
        </div>

        <div class="card-footer">
          <h3>{{ event.title }}</h3>
          <p class="event-meta" *ngIf="event.eventDate">
            <svg aria-hidden="true" width="14" height="14" fill="none" viewBox="0 0 24 24">
              <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 10h16M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01M16 18h.01M5 20h14a1 1 0 0 0 1-1V7a1 1 0 0 0-1-1H5a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1Zm3-16v2m8-2v2" />
            </svg>
            {{ event.eventDate | date:'mediumDate' }}
          </p>
        </div>
      </div>
    </div>

    <!-- Empty State Matching Mockup perfectly -->
    <div class="empty-state" *ngIf="filteredEvents.length === 0">
      <p>No events available in this section yet.</p>
    </div>

  </div>
</div>
