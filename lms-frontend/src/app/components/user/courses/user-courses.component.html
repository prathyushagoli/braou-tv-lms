<div class="user-courses-container">
  <div class="page-header">
    <h1 class="page-title">Courses</h1>
  </div>

  <div class="courses-navigation">
    <div class="tabs-container">
      <button *ngFor="let type of courseTypes" class="tab-btn" [ngClass]="{'active': activeType === type}"
        (click)="setActiveTab(type)">
        {{ type }}
      </button>
    </div>

    <div class="subject-filter-container">
      <select class="custom-select" (change)="onSubjectChange($event)">
        <option *ngFor="let sub of subjects" [value]="sub">{{ sub }}</option>
      </select>
      <svg class="select-icon" aria-hidden="true" width="16" height="16" fill="none" viewBox="0 0 24 24">
        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 9-7 7-7-7" />
      </svg>
    </div>
  </div>

  <!-- Content Grid -->
  <div class="courses-content-area">

    <div class="grid-container" *ngIf="filteredCourses.length > 0">
      <div class="video-card" *ngFor="let course of filteredCourses">
        <div class="iframe-container">
          <iframe *ngIf="getSafeUrl(course.url); let safeUrl" [src]="safeUrl" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
          </iframe>

          <div class="invalid-url" *ngIf="!getSafeUrl(course.url)">
            <span>Media Unavailable</span>
          </div>
        </div>

        <div class="card-footer">
          <h3>{{ course.title }}</h3>

          <div class="course-meta">
            <p class="subject-text" *ngIf="course.subject">{{ course.subject }}</p>

            <div class="academic-details">
              <span class="detail-badge" *ngIf="course.type">{{ course.type }}</span>
              <span class="detail-badge" *ngIf="course.courseYear">Year {{ course.courseYear }}</span>
              <span class="detail-badge" *ngIf="course.semester">Sem {{ course.semester }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div class="empty-state" *ngIf="filteredCourses.length === 0">
      <p>No courses available in this section yet.</p>
    </div>

  </div>
</div>
