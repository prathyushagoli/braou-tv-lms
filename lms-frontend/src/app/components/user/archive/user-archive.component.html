<div class="user-archive-container">
  <div class="page-header">
    <h1 class="page-title">Archived Videos</h1>
  </div>

  <!-- Content Grid -->
  <div class="archive-content-area">

    <div class="grid-container" *ngIf="archives.length > 0">
      <div class="video-card" *ngFor="let archive of archives">
        
        <!-- Facade Wrapper -->
        <div class="facade-container" *ngIf="activeVideoId !== archive.id" (click)="playVideo(archive.id)">
          <img loading="lazy" [src]="'https://img.youtube.com/vi/' + extractVideoId(archive.url) + '/hqdefault.jpg'" alt="Video Thumbnail" class="facade-img">
          <div class="facade-play-btn">
            <svg viewBox="0 0 68 48" class="youtube-play-icon">
              <path class="ytp-large-play-button-bg" d="M66.52,7.74c-0.78-2.93-2.49-5.41-5.42-6.19C55.79,.13,34,0,34,0S12.21,.13,6.9,1.55 C3.97,2.33,2.27,4.81,1.48,7.74C0.06,13.05,0,24,0,24s0.06,10.95,1.48,16.26c0.78,2.93,2.49,5.41,5.42,6.19 C12.21,47.87,34,48,34,48s21.79-0.13,27.1-1.55c2.93-0.78,4.64-3.26,5.42-6.19C67.94,34.95,68,24,68,24S67.94,13.05,66.52,7.74z" fill="#FF0000"></path>
              <path d="M 45,24 27,14 27,34" fill="#fff"></path>
            </svg>
          </div>
        </div>

        <div class="iframe-container" *ngIf="activeVideoId === archive.id">
          <!-- Render iFrame if secure URL validates properly -->
          <iframe *ngIf="getSafeUrl(archive.url); let safeUrl" [src]="safeUrl" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
          </iframe>

          <div class="invalid-url" *ngIf="!getSafeUrl(archive.url)">
            <span>Media Unavailable</span>
          </div>
        </div>

        <div class="card-footer">
          <h3>{{ archive.title }}</h3>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div class="empty-state" *ngIf="archives.length === 0">
      <p>No archives available yet.</p>
    </div>

  </div>
</div>
