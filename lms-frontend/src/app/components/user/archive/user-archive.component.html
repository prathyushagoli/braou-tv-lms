<div class="user-archive-container">
  <div class="page-header">
    <h1 class="page-title">Archived Videos</h1>
  </div>

  <div class="grid-container">
    <div class="video-card" *ngFor="let archive of archives">
      <div class="iframe-container">
        <!-- Render iFrame if secure URL validates properly -->
        <iframe loading="lazy" *ngIf="getSafeUrl(archive.url); let safeUrl" [src]="safeUrl" frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen>
        </iframe>

        <!-- Fallback if URL is invalid -->
        <div class="invalid-url" *ngIf="!getSafeUrl(archive.url)">
          <span>Video Unavailable</span>
        </div>
      </div>

      <div class="card-footer">
        <h3>{{ archive.title }}</h3>
      </div>
    </div>
  </div>

  <div class="empty-state" *ngIf="archives.length === 0">
    <p>No archived videos currently available.</p>
  </div>
</div>
