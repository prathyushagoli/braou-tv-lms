<div class="archive-container">
  <div class="page-header">
    <h1>Contact Details</h1>
  </div>

  <!-- Contact Data Card -->
  <div class="archive-list">
    <div class="archive-item">
      <div class="archive-info" style="width: 100%;">
        <h3>{{ contactObj.name || 'No Name Set' }}</h3>
        <p class="archive-url"><strong>Designation:</strong> {{ contactObj.designation || 'None' }}</p>
        <p class="archive-url"><strong>Email:</strong> {{ contactObj.email || 'None' }}</p>
        <p class="archive-url"><strong>Mobile 1:</strong> {{ contactObj.mobile1 || 'None' }}</p>
        <p class="archive-url"><strong>Mobile 2:</strong> {{ contactObj.mobile2 || 'None' }}</p>
      </div>
      
      <div class="archive-actions" style="margin-left: auto;">
        <!-- Edit Button -->
        <button class="btn-edit" (click)="openEditForm()">Edit</button>
      </div>
    </div>
  </div>

  <!-- Edit Contact Modal -->
  <div class="modal-overlay" *ngIf="showEditForm">
    <div class="add-card">
      <div class="card-header">
        <h3>Edit Contact Details</h3>
        <button class="btn-close" (click)="closeEditForm()">✕</button>
      </div>
      
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" [(ngModel)]="editObj.name" (keydown.enter)="saveContact()" placeholder="Enter Full Name">
      </div>

      <div class="form-group">
        <label>Designation</label>
        <input type="text" [(ngModel)]="editObj.designation" (keydown.enter)="saveContact()" placeholder="Enter Designation">
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" [(ngModel)]="editObj.email" (keydown.enter)="saveContact()" placeholder="Enter Email Address">
      </div>

      <div class="form-group">
        <label>Mobile Number 1</label>
        <input type="text" [(ngModel)]="editObj.mobile1" (keydown.enter)="saveContact()" placeholder="Enter Mobile Number 1">
      </div>

      <div class="form-group">
        <label>Mobile Number 2</label>
        <input type="text" [(ngModel)]="editObj.mobile2" (keydown.enter)="saveContact()" placeholder="Enter Mobile Number 2">
      </div>
      
      <div class="form-actions">
        <button class="btn-cancel" (click)="closeEditForm()" [disabled]="isSaving || isSaved">Cancel</button>
        <button class="btn-add" (click)="saveContact()" [disabled]="isSaving || isSaved">
          <span *ngIf="isSaving" class="btn-spinner"></span>
          <span *ngIf="isSaving">Saving...</span>
          <span *ngIf="isSaved">Saved ✓</span>
          <span *ngIf="!isSaving && !isSaved">Save Changes</span>
        </button>
      </div>
    </div>
  </div>
</div>
