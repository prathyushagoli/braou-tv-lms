<div class="programmes-container">
  <div class="page-header">
    <h1>Contact Details</h1>
  </div>

  <!-- Contact Data Card -->
  <div class="archive-list">
    <div class="archive-item">
      <div class="archive-info" style="width: 100%;">
        <h3>{{ contactObj.name || 'No Name Set' }}</h3>
        <p class="archive-url">{{ contactObj.designation || 'None' }}</p>
        <p class="archive-url">{{ contactObj.email || 'None' }}</p>
        <p class="archive-url">{{contactObj.mobile1 || 'None' }}</p>
        <p class="archive-url">{{ contactObj.mobile2 || 'None' }}</p>
      </div>

      <div class="archive-actions" style="margin-left: auto;">
        <!-- Edit Button -->
        <button class="btn-edit" (click)="openEditForm()">Edit</button>
      </div>
    </div>
  </div>

  <!-- Edit Contact Modal -->
  <div class="modal-overlay" *ngIf="showEditForm">
    <div class="add-card">
      <div class="card-header">
        <h3>Edit Contact Details</h3>
        <button class="btn-close" (click)="closeEditForm()">✕</button>
      </div>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" [(ngModel)]="editObj.name" (keydown.enter)="saveContact()" placeholder="Enter Full Name">
      </div>

      <div class="form-group">
        <label>Designation</label>
        <input type="text" [(ngModel)]="editObj.designation" (keydown.enter)="saveContact()"
          placeholder="Enter Designation">
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" [(ngModel)]="editObj.email" (keydown.enter)="saveContact()"
          placeholder="Enter Email Address">
      </div>

      <div class="form-group">
        <label>Phone Number 1</label>
        <input type="text" [(ngModel)]="editObj.mobile1" (keydown.enter)="saveContact()"
          placeholder="Enter Phone Number 1">
      </div>

      <div class="form-group">
        <label>Phone Number 2</label>
        <input type="text" [(ngModel)]="editObj.mobile2" (keydown.enter)="saveContact()"
          placeholder="Enter Phone Number 2">
      </div>

      <div class="form-actions">
        <button class="btn-cancel" (click)="closeEditForm()" [disabled]="isSaving || isSaved">Cancel</button>
        <button class="btn-add" (click)="saveContact()" [disabled]="isSaving || isSaved">
          <span *ngIf="isSaving" class="btn-spinner"></span>
          <span *ngIf="isSaving">Saving...</span>
          <span *ngIf="isSaved">Saved ✓</span>
          <span *ngIf="!isSaving && !isSaved">Save Changes</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Launch Banner Configuration Card -->
  <div class="page-header" style="margin-top: 3rem;">
    <h1>Launch Banner Settings</h1>
  </div>

  <div class="archive-list">
    <div class="archive-item" style="flex-direction: column; align-items: stretch; gap: 1rem;">
      <div
        style="display: flex; align-items: center; justify-content: flex-start; gap: 1rem; border-bottom: 1px solid #1e293b; padding-bottom: 1rem; margin-bottom: 0.5rem;">
        <h3 style="margin: 0; color: white; font-size: 1.15rem; font-weight: 600;">Home Page Launch Module</h3>

        <!-- Native Toggle Switch -->
        <label class="toggle-switch">
          <input type="checkbox" [(ngModel)]="contactObj.isLaunchVideoActive" (change)="saveContactConfigOnly()">
          <span class="slider round"></span>
        </label>
      </div>

      <!-- Video URL Payload Configuration directly editable dynamically -->
      <div class="form-group" style="margin-bottom: 0;">
        <label>YouTube URL</label>
        <div style="display: flex; gap: 1rem;">
          <input type="text" [(ngModel)]="contactObj.launchVideoUrl" placeholder="https://youtube.com/...">
          <button class="btn-add" (click)="saveContactConfigOnly()"
            [disabled]="isSavingBanner || contactObj.launchVideoUrl === originalLaunchVideoUrl">
            <span *ngIf="isSavingBanner" class="btn-spinner"></span>
            <span *ngIf="!isSavingBanner">Save</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
