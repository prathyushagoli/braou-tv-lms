<div class="contact-container">
  <div class="header-row">
    <h1>Contact Details</h1>
    <p>Manage the dynamic contact information displayed globally in the User Portal's footer and About Us pages. All fields are optional.</p>
  </div>

  <div class="form-card">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" class="form-control" [(ngModel)]="contactObj.name" placeholder="E.g., Prof. D. Rabindranath Solomon">
    </div>
    <div class="form-group">
      <label>Designation</label>
      <input type="text" class="form-control" [(ngModel)]="contactObj.designation" placeholder="E.g., Director (EMR&RC)">
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" class="form-control" [(ngModel)]="contactObj.email" placeholder="E.g., directoravprc@braou.ac.in">
    </div>
    <div class="form-group">
      <label>Mobile Number 1</label>
      <input type="text" class="form-control" [(ngModel)]="contactObj.mobile1" placeholder="E.g., 040-23680320">
    </div>
    <div class="form-group">
      <label>Mobile Number 2</label>
      <input type="text" class="form-control" [(ngModel)]="contactObj.mobile2" placeholder="E.g., 9281013602">
    </div>

    <button class="btn-save" (click)="saveContact()" [disabled]="isSaving || isSaved">
      <span *ngIf="isSaving" class="btn-spinner"></span>
      <span *ngIf="isSaving">Saving...</span>
      <span *ngIf="isSaved">Saved ✓</span>
      <span *ngIf="!isSaving && !isSaved">Save Contact Details</span>
    </button>
  </div>
</div>
