<div class="archive-container">
  <div class="page-header">
    <h1>Archived Videos</h1>
    <button class="btn-primary" (click)="toggleAddForm()">
      <span class="icon">+</span> Add Video
    </button>
  </div>
  
  <!-- Add/Edit Video Form (Modal) -->
  <div class="modal-overlay" *ngIf="showAddForm">
    <div class="add-card">
      <div class="card-header">
        <h3>{{ editingArchiveId ? 'Edit Video' : 'Add Video' }}</h3>
        <button class="btn-close" (click)="toggleAddForm()">✕</button>
      </div>
      
      <div class="form-group">
        <label>Video Title <span class="mandatory">*</span></label>
        <input type="text" [(ngModel)]="newArchiveTitle" (keydown.enter)="saveArchive()" placeholder="Video title" required>
      </div>
      
      <div class="form-group">
        <label>YouTube URL <span class="mandatory">*</span></label>
        <input type="text" [(ngModel)]="newArchiveUrl" (keydown.enter)="saveArchive()" placeholder="https://youtube.com/..." required>
      </div>
      
      <div class="form-actions">
        <button class="btn-cancel" (click)="toggleAddForm()" [disabled]="isSaving || isSaved">Cancel</button>
        <button class="btn-add" (click)="saveArchive()" [disabled]="!newArchiveTitle || !newArchiveUrl || isSaving || isSaved">
          <span *ngIf="isSaving" class="btn-spinner"></span>
          <span *ngIf="isSaving">Saving...</span>
          <span *ngIf="isSaved">Saved ✓</span>
          <span *ngIf="!isSaving && !isSaved">{{ editingArchiveId ? 'Save Changes' : 'Add Video' }}</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay" *ngIf="showDeleteConfirm">
    <div class="delete-card">
      <h3>Confirm Deletion</h3>
      <p>Are you sure you want to delete this archived video? This action cannot be undone.</p>
      <div class="form-actions delete-actions">
        <button class="btn-cancel" (click)="cancelDelete()" [disabled]="isDeleting || isSaved">Cancel</button>
        <button class="btn-danger" (click)="confirmDelete()" [disabled]="isDeleting || isSaved">
          <span *ngIf="isDeleting" class="btn-spinner"></span>
          <span *ngIf="isDeleting">Deleting...</span>
          <span *ngIf="isSaved">Deleted ✓</span>
          <span *ngIf="!isDeleting && !isSaved">Delete</span>
        </button>
      </div>
    </div>
  </div>

  <div class="archive-list">
    <div class="archive-item" *ngFor="let archive of archives">
      <div class="archive-info">
        <h3>{{ archive.title }}</h3>
        <p class="archive-url">{{ archive.url }}</p>
      </div>
      
      <div class="archive-actions">
        <!-- Edit Button -->
        <button class="btn-edit" (click)="openEditForm(archive)">Edit</button>
        <!-- Delete Button -->
        <button class="btn-delete" (click)="promptDelete(archive.id!)">Delete</button>
      </div>
    </div>
    
    <div class="empty-state" *ngIf="archives.length === 0">
      <p>No archived videos to display yet.</p>
    </div>
  </div>
</div>
