<div class="programmes-container">
  <div class="page-header">
    <h1>Events</h1>
    <button class="btn-primary" (click)="toggleAddForm()">
      <span class="icon">+</span> Add Event
    </button>
  </div>

  <div class="tabs">
    <button class="tab" *ngFor="let tab of tabs" 
            [class.active]="activeTab === tab" 
            (click)="setTab(tab)">{{ tab }}</button>
  </div>
  
  <!-- Add Event Form (Modal) -->
  <div class="modal-overlay" *ngIf="showAddForm">
    <div class="add-card">
      <div class="card-header">
        <h3>{{ editingEventId ? 'Edit Event' : 'Add Event' }}</h3>
        <button class="btn-close" (click)="toggleAddForm()">✕</button>
      </div>
      
      <div class="form-group">
        <label>Event Type <span class="mandatory">*</span></label>
        <div class="custom-select-container">
          <div class="custom-select-btn" (click)="dropdownOpen = !dropdownOpen">
            {{ newEventType || 'Select Type' }}
            <span class="arrow">▼</span>
          </div>
          <ul class="custom-select-options custom-scrollbar" *ngIf="dropdownOpen">
            <div class="dropdown-inner-search" (click)="$event.stopPropagation()">
              <input type="text" placeholder="Search..." [(ngModel)]="searchType" class="inner-search-input" appAutoFocus>
            </div>
            <li *ngFor="let tab of tabs | searchFilter:searchType" (click)="newEventType = tab; dropdownOpen = false">{{ tab }}</li>
          </ul>
        </div>
      </div>
      
      <div class="form-group">
        <label>Title <span class="mandatory">*</span></label>
        <input type="text" [(ngModel)]="newEventTitle" (keydown.enter)="saveEvent()" placeholder="Event title" required>
      </div>
      
      <div class="form-group">
        <label>YouTube URL <span class="mandatory">*</span></label>
        <input type="text" [(ngModel)]="newEventUrl" (keydown.enter)="saveEvent()" placeholder="https://youtube.com/..." required>
      </div>

      <div class="form-group">
        <label>Date (optional)</label>
        <input type="date" [(ngModel)]="newEventDate" (keydown.enter)="saveEvent()">
      </div>
      
      <div class="form-actions">
        <button class="btn-cancel" (click)="toggleAddForm()" [disabled]="isSaving || isSaved">Cancel</button>
        <button class="btn-add" (click)="saveEvent()" [disabled]="!newEventTitle || !newEventUrl || !newEventType || isSaving || isSaved">
          <span *ngIf="isSaving" class="btn-spinner"></span>
          <span *ngIf="isSaving">Saving...</span>
          <span *ngIf="isSaved">Saved ✓</span>
          <span *ngIf="!isSaving && !isSaved">{{ editingEventId ? 'Save Changes' : 'Add Event' }}</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay" *ngIf="showDeleteConfirm">
    <div class="delete-card">
      <h3>Confirm Deletion</h3>
      <p>Are you sure you want to delete this event? This action cannot be undone.</p>
      <div class="form-actions delete-actions">
        <button class="btn-cancel" (click)="cancelDelete()" [disabled]="isDeleting || isSaved">Cancel</button>
        <button class="btn-danger" (click)="confirmDelete()" [disabled]="isDeleting || isSaved">
          <span *ngIf="isDeleting" class="btn-spinner"></span>
          <span *ngIf="isDeleting">Deleting...</span>
          <span *ngIf="isSaved">Deleted ✓</span>
          <span *ngIf="!isDeleting && !isSaved">Delete</span>
        </button>
      </div>
    </div>
  </div>

  <div class="stream-list">
    <div class="stream-item" *ngFor="let event of filteredEvents">
      <div class="stream-info">
        <div class="name-row">
          <h3>{{ event.title }}</h3>
          <span class="stream-date" *ngIf="event.eventDate">{{ event.eventDate }}</span>
        </div>
        <p class="stream-url">{{ event.url }}</p>
      </div>
      
      <div class="stream-actions">
        <button class="btn-edit" (click)="openEditForm(event)">Edit</button>
        <button class="btn-delete" (click)="promptDelete(event.id!)">Delete</button>
      </div>
    </div>
    
    <div class="empty-state" *ngIf="filteredEvents.length === 0">
      <p>No events in this section yet.</p>
    </div>
  </div>
</div>
