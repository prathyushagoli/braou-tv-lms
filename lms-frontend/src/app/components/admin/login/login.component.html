<div class="login-container">
  <div class="login-card">
    <div class="logo-box" style="margin-bottom: 0.5rem; display: flex; justify-content: center;">
      <img src="assets/images/braou-tv-logo.png" alt="Logo" style="height: 100px; width: auto; object-fit: contain;">
    </div>
    
    <h2>BRAOU TV Admin</h2>
    <p class="subtitle">Sign in to manage your platform</p>
    
    <form (ngSubmit)="onSignIn()">
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          [(ngModel)]="email" 
          placeholder="admin@braou.ac.in" 
          required>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="password" 
          required>
      </div>
      
      <button type="submit" class="btn-signin">Sign In</button>
    </form>
  </div>
</div>
