<div class="login-container">
  <div class="login-card">
    <div class="logo-box" style="margin-bottom: 0.5rem; display: flex; justify-content: center;">
      <img src="assets/images/braou-tv-logo.png" alt="Logo" style="height: 100px; width: auto; object-fit: contain;">
    </div>
    
    <h2 style="display: flex; align-items: center; justify-content: center; gap: 0.3rem;">
      <span style="color: #3b82f6;">BRAOU</span>
      <span style="background-color: white; color: red; font-size: 1.1em; padding: 0.05em 0.08em; border-radius: 6px; font-weight: 900; line-height: 1;">TV</span>
      <span style="margin-left: 0.3rem;">Admin</span>
    </h2>
    <p class="subtitle">Sign in to manage your platform</p>
    
    <form (ngSubmit)="onSignIn()">
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          [(ngModel)]="email" 
          placeholder="admin@braou.ac.in" 
          required>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="password" 
          required>
      </div>
      
      <button type="submit" class="btn-signin">Sign In</button>
    </form>
  </div>
</div>
